<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <meta name="theme-color" content="#2E7D32" />
    <meta name="description" content="Offline-first hiking safety and navigation app." />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3037/3037915.png" />

    <title>TrailGuard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#2E7D32',
              secondary: '#81C784',
              danger: '#D32F2F',
              surface: '#FFFFFF',
              background: '#F5F5F5',
            }
          }
        }
      }
    </script>
    <style>
      /* Leaflet map container height fix */
      .leaflet-container {
        width: 100%;
        height: 100%;
        z-index: 0;
      }
      /* Custom scrollbar for bottom sheet */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "leaflet/": "https://esm.sh/leaflet@^1.9.4/",
    "leaflet": "https://esm.sh/leaflet@^1.9.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "react-leaflet": "https://esm.sh/react-leaflet@^5.0.0"
  }
}
</script>
</head>
  <body class="bg-background text-gray-900 overflow-hidden">
    <div id="root" class="h-screen w-screen relative overflow-hidden"></div>
